# Nginx 反向代理：80 端口转发到 Django (127.0.0.1:8000)
#
# 使用步骤：
#   1. 复制到 Nginx：sudo cp nginx.conf /etc/nginx/sites-available/ship
#   2. 启用：sudo ln -sf /etc/nginx/sites-available/ship /etc/nginx/sites-enabled/
#   3. 若需去掉默认站：sudo rm /etc/nginx/sites-enabled/default
#   4. 测试：sudo nginx -t
#   5. 重载：sudo nginx -s reload
#
# 访问：http://服务器IP 或 http://域名（需在 ALLOWED_HOSTS 中加入）

server {
    listen 80;
    listen [::]:80;
    server_name _;
    charset utf-8;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
